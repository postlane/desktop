name: Notarize — finalize and publish release

# Triggered manually once Apple approves the notarisation submission(s).
# Workflow:
#   1. Downloads the DMG artifacts + submission IDs from the build run.
#   2. Waits for Apple to finish (xcrun notarytool wait).
#   3. Staples the notarisation ticket to each DMG.
#   4. Uploads the stapled DMGs to the draft release.
#   5. Publishes the draft release.
#
# Inputs:
#   tag        — the version tag, e.g. v0.1.3
#   build_run  — the GitHub Actions run ID of the release.yml build job
#                (visible in the URL: /runs/<id>)
#
# To find build_run_id:
#   gh run list --workflow=release.yml --limit 5

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.3)'
        required: true
        type: string
      build_run_id:
        description: 'Run ID of the release.yml build (from the /runs/<id> URL)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notarize:
    runs-on: macos-latest
    permissions:
      contents: write   # needed to upload assets and publish the draft release
      actions: read     # needed to download artifacts from the build run
    timeout-minutes: 360  # Apple review can take hours; 6 hours is the GitHub maximum

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Wait for notarisation and staple DMGs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          # Find all submission-id files; each sits alongside its DMG.
          submission_files=( artifacts/**/*.submission-id )
          if [ ${#submission_files[@]} -eq 0 ]; then
            echo "ERROR: no *.submission-id files found in artifacts." >&2
            echo "Ensure the release.yml build ran with the submit step." >&2
            exit 1
          fi

          for id_file in "${submission_files[@]}"; do
            submission_id=$(cat "$id_file")
            # DMG path: replace .submission-id suffix with .dmg
            dmg="${id_file%.submission-id}.dmg"
            if [ ! -f "$dmg" ]; then
              echo "ERROR: DMG not found alongside $id_file (expected $dmg)" >&2
              exit 1
            fi

            echo "[$(date -u +%H:%M:%SZ)] Waiting for Apple to approve $submission_id ($(basename "$dmg"))..."
            xcrun notarytool wait "$submission_id" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --timeout 21000

            echo "[$(date -u +%H:%M:%SZ)] Stapling $(basename "$dmg")..."
            xcrun stapler staple "$dmg"
            echo "[$(date -u +%H:%M:%SZ)] Stapled: $(basename "$dmg")"
          done

      - name: Upload stapled DMGs to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar nullglob
          dmg_files=( artifacts/**/*.dmg )
          if [ ${#dmg_files[@]} -eq 0 ]; then
            echo "ERROR: no DMG files found to upload." >&2
            exit 1
          fi
          for dmg in "${dmg_files[@]}"; do
            echo "Uploading $(basename "$dmg")..."
            gh release upload "${{ inputs.tag }}" "$dmg" --clobber
          done

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ inputs.tag }}" --draft=false
          echo "Release ${{ inputs.tag }} is now published."
